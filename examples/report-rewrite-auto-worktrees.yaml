schema: ocmo/v1

operation:
  id: report-rewrite-auto-worktrees-example
  description: Rewrite selected report-like work units using per-work-unit worktrees.
  workspace: ..

runner:
  command: opencode
  agent: build
  model: openai/gpt-5.5
  attach: null
  timeoutSeconds: 14400
  dangerouslySkipPermissions: false

selection:
  default: uncompleted

queue:
  concurrency: 3
  order: manifest
  stopOnFailure: false
  autoWorktrees:
    enabled: true
    root: .ocmo/worktrees
    baseBranch: main
    branchPattern: ocmo/{operation_id}/{work_unit_id}
    setup: []
    teardown: []
    cleanup: never

policy:
  worktree: per-work-unit
  baseBranch: main
  reviewLoop:
    enabled: true
    maxAttempts: 3

prompt:
  template: prompts/report-rewrite.md

state:
  path: ../.ocmo/state/report-rewrite-auto-worktrees-example.json

workUnits:
  - id: WORK-001
    title: ExampleReportOne
    payload:
      workItemKey: WORK-001
      targetName: ExampleReportOne
      branch: feature/WORK-001_example-report-one
      reviewer: reviewer-user
      assignee: assignee-user
  - id: WORK-002
    title: ExampleReportTwo
    payload:
      workItemKey: WORK-002
      targetName: ExampleReportTwo
      branch: feature/WORK-002_example-report-two
      reviewer: reviewer-user
      assignee: assignee-user
