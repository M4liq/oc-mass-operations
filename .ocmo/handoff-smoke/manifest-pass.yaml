schema: ocmo/v1
operation:
  id: handoff-smoke-pass
  workspace: .
runner:
  command: python
  agent: build
queue:
  concurrency: 1
policy:
  worktree: isolated
prompt:
  template: prompt.md
state:
  path: state-pass.json
workUnits:
  - id: BUG-PASS
    title: Passing handoff smoke
    status: pending
    payload:
      mode: proceed
    runs:
      mode: sequential
      steps:
        - id: plan
          agent: build
          produces:
            handoff:
              type: handoff
              required: true
              gates:
                decision: proceed
                minConfidence: 0.9
                requireConditionsMet: true
        - id: implement
          agent: build
          consumes:
            - plan.handoff
